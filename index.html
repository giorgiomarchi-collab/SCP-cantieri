<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCP Cantieri</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0D0F12;--panel:#131720;--card:#1A1F2B;--card2:#1F2535;--card3:#242A38;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.18);
  --st:#8B96A8;--st2:#B0BAC8;--wh:#E8EBF0;
  --ac:#4A9EE8;--ac2:#2F7CC4;--gr:#3DAA6E;--rd:#D94F4F;--am:#E08A2A;--go:#C8A84B;
  --fn:'Barlow',sans-serif;--fc:'Barlow Condensed',sans-serif;
}
body{background:var(--bg);font-family:var(--fn);color:var(--wh);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;position:relative;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--ac) 0%,transparent 55%);}
.logo-wrap{display:flex;align-items:center;gap:11px;}
.logo-svg{width:32px;height:32px;flex-shrink:0;}
.logo-text .brand{font-family:var(--fc);font-size:17px;font-weight:700;letter-spacing:.08em;color:var(--wh);display:block;line-height:1;}
.logo-text .sub{font-size:8.5px;font-weight:400;letter-spacing:.18em;color:var(--st);text-transform:uppercase;margin-top:2px;display:block;}
.app-badge{background:var(--ac);color:#fff;font-family:var(--fc);font-size:10px;font-weight:600;letter-spacing:.12em;padding:3px 9px;border-radius:2px;text-transform:uppercase;margin-left:2px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.icon-btn{width:30px;height:30px;background:var(--card);border:1px solid var(--b2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--rd);border-radius:50%;border:1.5px solid var(--panel);}
.avatar{width:30px;height:30px;background:var(--ac2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-size:12px;font-weight:700;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--panel);border-right:1px solid var(--b1);padding:20px 0;flex-shrink:0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:14px 18px;font-size:13px;font-weight:500;color:var(--st2);cursor:pointer;border-left:3px solid transparent;transition:all .14s;}
.nav-item:hover{background:rgba(74,158,232,.06);color:var(--wh);}
.nav-item.active{background:rgba(74,158,232,.1);color:var(--ac);border-left-color:var(--ac);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:22px;background:var(--bg);}
.page{display:none;animation:fadeIn .2s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ── PAGE HEADER ── */
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;}
.page-title{font-family:var(--fc);font-size:21px;font-weight:700;letter-spacing:.04em;}
.page-sub{font-size:11px;color:var(--st);margin-top:3px;}
.btn-primary{display:flex;align-items:center;gap:6px;background:var(--ac);border:none;color:#fff;font-family:var(--fn);font-size:12px;font-weight:600;padding:8px 15px;border-radius:6px;cursor:pointer;}
.btn-ghost{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--b2);color:var(--st2);font-family:var(--fn);font-size:12px;font-weight:500;padding:8px 13px;border-radius:6px;cursor:pointer;margin-right:8px;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.kpi.bl::before{background:var(--ac);}
.kpi.gr::before{background:var(--gr);}
.kpi.am::before{background:var(--am);}
.kpi.rd::before{background:var(--rd);}
.kpi-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;color:var(--st);text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:var(--fc);font-size:26px;font-weight:700;line-height:1;color:var(--wh);}
.kpi-unit{font-size:12px;font-weight:400;color:var(--st2);margin-left:2px;}
.kpi-trend{font-size:10px;color:var(--gr);margin-top:4px;}
.kpi-trend.down{color:var(--rd);}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:1fr 320px;gap:14px;}
.full{grid-column:1/-1;}

/* ── SECTION TITLE ── */
.sec-title{font-family:var(--fc);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--st);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--b1);}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:15px 17px;}

/* ── CANTIERE CARDS ── */
.cantieri-list{display:flex;flex-direction:column;gap:9px;}
.c-card{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;cursor:pointer;transition:border-color .15s;}
.c-card:hover{border-color:var(--b2);}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
.c-nome{font-family:var(--fc);font-size:14px;font-weight:600;letter-spacing:.03em;}
.c-luogo{font-size:10.5px;color:var(--st);margin-top:2px;}
.pill{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:3px;}
.pill.att{background:rgba(61,170,110,.15);color:#5DCC8A;border:1px solid rgba(61,170,110,.3);}
.pill.sos{background:rgba(224,138,42,.15);color:#F0A040;border:1px solid rgba(224,138,42,.3);}
.pill.chi{background:rgba(139,150,168,.12);color:#8B96A8;border:1px solid rgba(139,150,168,.2);}
.prog-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--ac);}
.prog-pct{font-family:var(--fc);font-size:12px;font-weight:600;color:var(--st2);min-width:32px;text-align:right;}
.c-meta{display:flex;gap:14px;flex-wrap:wrap;}
.meta-i{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--st);}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot.r{background:var(--rd);}
.dot.g{background:var(--gr);}
.dot.a{background:var(--am);}

/* ── ACTIVITY ── */
.act-list{display:flex;flex-direction:column;}
.act-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--b1);}
.act-item:last-child{border-bottom:none;}
.act-ico{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.act-ico.dl{background:rgba(74,158,232,.15);}
.act-ico.nc{background:rgba(217,79,79,.15);}
.act-ico.sec{background:rgba(61,170,110,.15);}
.act-ico.fo{background:rgba(200,168,75,.15);}
.act-ttl{font-size:11.5px;font-weight:500;color:var(--st2);line-height:1.3;}
.act-sub{font-size:10px;color:var(--st);margin-top:2px;}
.act-time{font-size:10px;color:var(--st);flex-shrink:0;padding-top:1px;}

/* ── NC LIST ── */
.nc-list{display:flex;flex-direction:column;gap:7px;}
.nc-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:5px;}
.nc-item.alta{background:rgba(217,79,79,.07);border:1px solid rgba(217,79,79,.2);}
.nc-item.med{background:rgba(224,138,42,.07);border:1px solid rgba(224,138,42,.2);}
.nc-grav{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nc-grav.r{background:var(--rd);}
.nc-grav.a{background:var(--am);}
.nc-ttl{font-size:11.5px;font-weight:500;color:var(--st2);flex:1;}
.nc-scad{font-size:10px;}
.nc-scad.r{color:var(--rd);}
.nc-scad.a{color:var(--am);}

/* ── FORM FIELDS ── */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.field:last-child{margin-bottom:0;}
.field-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--st);text-transform:uppercase;}
.field-input{background:rgba(255,255,255,.05);border:1px solid var(--b2);border-radius:5px;padding:8px 11px;color:var(--wh);font-family:var(--fn);font-size:12.5px;outline:none;width:100%;}
.field-input:focus{border-color:var(--ac);}
.field-input::placeholder{color:var(--st);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ── SEC HDR (verbale) ── */
.sec-hdr-box{border:1px solid var(--b2);border-radius:6px;padding:8px 12px;margin-bottom:11px;position:relative;}
.sec-hdr-box::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--st);border-radius:0 2px 2px 0;}
.sec-hdr-lbl{font-size:8.5px;font-weight:600;letter-spacing:.18em;color:var(--st);text-transform:uppercase;}

/* ── PERSONE ── */
.pres-row{display:flex;align-items:center;gap:9px;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:5px;margin-bottom:6px;}
.pres-row:last-child{margin-bottom:0;}
.pav{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.pav.b{background:var(--ac2);}
.pav.g{background:var(--gr);}
.pav.s{background:#3A4A5E;}
.pres-nome{font-size:12.5px;font-weight:500;color:var(--st2);flex:1;}
.pres-ruolo{font-size:10px;color:var(--st);}
.rbadge{font-size:8.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:3px;}
.rbadge.dl{background:rgba(74,158,232,.15);color:#6BB8F0;border:1px solid rgba(74,158,232,.25);}
.rbadge.cse{background:rgba(61,170,110,.15);color:#5DCC8A;border:1px solid rgba(61,170,110,.25);}
.rbadge.imp{background:rgba(139,150,168,.12);color:#A0B0C4;border:1px solid rgba(139,150,168,.2);}

/* ── ARGS ── */
.arg-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;background:rgba(255,255,255,.04);border-radius:5px;border-left:3px solid transparent;margin-bottom:6px;}
.arg-item.open{border-left-color:var(--am);}
.arg-item.ok{border-left-color:var(--gr);}
.arg-item.info{border-left-color:var(--ac);}
.arg-n{font-family:var(--fc);font-size:11px;color:var(--st);min-width:18px;padding-top:1px;}
.arg-txt{font-size:12.5px;color:var(--st2);flex:1;line-height:1.4;}
.arg-badge{font-size:8.5px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;}
.ab-open{background:rgba(224,138,42,.15);color:#F0A040;}
.ab-ok{background:rgba(61,170,110,.15);color:#5DCC8A;}
.ab-info{background:rgba(74,158,232,.15);color:#6BB8F0;}

/* ── FOTO GRID ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.foto-item{aspect-ratio:4/3;border-radius:5px;background:var(--card3);border:1px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;}
.foto-item.add{border-style:dashed;}
.foto-pin{position:absolute;top:5px;right:5px;background:var(--ac);border-radius:2px;padding:2px 5px;font-size:8.5px;font-weight:700;color:#fff;}
.foto-lbl{font-size:9.5px;color:var(--st);margin-top:4px;text-align:center;padding:0 4px;}

/* ── GANTT ── */
.gantt-wrap{overflow-x:auto;}
.gantt-hdr{display:flex;border-bottom:1px solid var(--b2);padding-bottom:5px;margin-bottom:6px;}
.gantt-name-col{width:80px;flex-shrink:0;font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--st);text-transform:uppercase;}
.gantt-ditta-col{width:90px;flex-shrink:0;font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--st);text-transform:uppercase;}
.gantt-months{flex:1;display:flex;}
.gantt-month{flex:1;font-size:9px;color:var(--st);text-align:center;}
.gantt-row-g{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.gantt-row-g:last-child{border-bottom:none;}
.gantt-lbl{width:80px;flex-shrink:0;font-size:11.5px;color:var(--st2);}
.gantt-ditta{width:90px;flex-shrink:0;font-size:10px;color:var(--st);padding-right:6px;}
.gantt-bars{flex:1;position:relative;height:18px;}

/* ── SCHEDA PROGETTO ── */
.proj-hdr{background:var(--card);border:1px solid var(--b2);border-radius:7px;padding:13px 17px;margin-bottom:14px;position:relative;overflow:hidden;}
.proj-hdr::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--ac);}
.proj-badge{font-size:8.5px;font-weight:600;letter-spacing:.18em;color:var(--ac);text-transform:uppercase;margin-bottom:2px;}
.proj-title{font-family:var(--fc);font-size:19px;font-weight:700;letter-spacing:.03em;}
.proj-sub{font-size:10.5px;color:var(--st);margin-top:3px;}

/* ── FIGURE PROFESS. ── */
.fig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:10px;}
.fig-card{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;}
.fig-role{font-size:8.5px;font-weight:600;letter-spacing:.14em;color:var(--st);text-transform:uppercase;margin-bottom:7px;}
.fig-nome{font-size:12.5px;font-weight:500;color:var(--wh);}
.fig-mail{font-size:10px;color:var(--st);margin-top:2px;}

/* ── STATI AVANZAM. ── */
.sal-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.sal-chip{font-size:10.5px;padding:4px 10px;border-radius:3px;background:rgba(255,255,255,.06);border:1px solid var(--b2);color:var(--st2);}
.sal-chip.att{background:rgba(74,158,232,.15);border-color:rgba(74,158,232,.4);color:var(--ac);}
.sal-chip.ok{background:rgba(61,170,110,.15);border-color:rgba(61,170,110,.35);color:#5DCC8A;}

/* ── VERBALE SAL BAR ── */
.sal-bar-wrap{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}
.sal-track{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.sal-fill{height:100%;border-radius:3px;background:var(--ac);}
.sal-pct{font-family:var(--fc);font-size:15px;font-weight:700;color:var(--wh);min-width:40px;text-align:right;}

/* ── ORDINI ── */
.os-item{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:5px;margin-bottom:6px;}
.os-num{font-family:var(--fc);font-size:12.5px;font-weight:700;color:var(--ac);min-width:28px;}
.os-txt{font-size:12.5px;color:var(--st2);flex:1;line-height:1.4;}
.os-scad{font-size:10px;color:var(--st);flex-shrink:0;padding-top:2px;}

/* ── FIRMA AREA ── */
.firme-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:8px;}
.firma-box{border-bottom:1px solid var(--b3);padding-bottom:30px;}
.firma-nome{font-size:12px;font-weight:500;color:var(--st2);}
.firma-ruolo{font-size:10px;color:var(--st);margin-top:2px;}

/* ── ADD BTN ── */
.add-btn{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;color:var(--ac);cursor:pointer;background:none;border:none;font-family:var(--fn);}

/* ── NOTE AREA ── */
.note-area{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b2);border-radius:5px;color:var(--wh);font-family:var(--fn);font-size:12.5px;padding:9px 11px;resize:vertical;min-height:65px;}

/* ── NC FULL ── */
.nc-full-item{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:14px 16px;margin-bottom:9px;border-left:3px solid transparent;}
.nc-full-item.alta{border-left-color:var(--rd);}
.nc-full-item.med{border-left-color:var(--am);}
.nc-full-item.bassa{border-left-color:var(--gr);}
.nc-full-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.nc-full-title{font-family:var(--fc);font-size:14px;font-weight:600;}
.nc-full-desc{font-size:12px;color:var(--st2);line-height:1.5;margin-bottom:8px;}
.nc-meta-row{display:flex;gap:16px;flex-wrap:wrap;}
.nc-meta-item{font-size:10.5px;color:var(--st);display:flex;gap:5px;align-items:center;}
.nc-meta-item strong{color:var(--st2);}

/* ── ARCHIVIO TABLE ── */
.arch-table{width:100%;border-collapse:collapse;}
.arch-table th{font-size:9px;font-weight:600;letter-spacing:.14em;color:var(--st);text-transform:uppercase;padding:7px 10px;text-align:left;border-bottom:1px solid var(--b2);}
.arch-table td{font-size:12px;color:var(--st2);padding:8px 10px;border-bottom:1px solid var(--b1);}
.arch-table tr:hover td{background:rgba(255,255,255,.02);}
.arch-table td:first-child{font-weight:500;color:var(--wh);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

/* ── MOBILE ── */
.bottomnav{display:none;}
@media (max-width:768px){
  body{height:100dvh;}
  .sidebar{display:none;}
  .main{padding:14px;padding-bottom:80px;}
  .bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    height:62px;background:var(--panel);
    border-top:1px solid var(--b2);
    z-index:100;
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;cursor:pointer;color:var(--st);transition:color .14s;
    -webkit-tap-highlight-color:transparent;
    border:none;background:none;font-family:var(--fn);
  }
  .bn-item.active{color:var(--ac);}
  .bn-item svg{width:20px;height:20px;}
  .bn-item span{font-size:9.5px;font-weight:500;letter-spacing:.02em;}
  .bn-item.active svg{filter:drop-shadow(0 0 4px rgba(74,158,232,.5));}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .page-hdr{flex-direction:column;align-items:flex-start;gap:10px;}
  .page-hdr>div:last-child{width:100%;display:flex;gap:8px;}
  .btn-primary,.btn-ghost{flex:1;justify-content:center;padding:10px;}
  .row2,.row3{grid-template-columns:1fr;}
  .fig-grid{grid-template-columns:1fr;}
  .firme-grid{grid-template-columns:1fr;}
  .foto-grid{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 14px;}
  .logo-text .sub{display:none;}
  .app-badge{display:none;}
  .pres-row{padding:10px;}
  .pav{width:34px;height:34px;}
  .card{padding:13px 14px;}
  .field-input{font-size:16px;} /* prevents iOS zoom */
  .note-area{font-size:16px;}
  .gantt-ditta-col,.gantt-ditta{display:none;}
  .arch-table th:nth-child(3),.arch-table td:nth-child(3),
  .arch-table th:nth-child(4),.arch-table td:nth-child(4){display:none;}
}
</head>
<body>

<!-- TOPBAR -->

<script>
// ── NAVIGAZIONE ──────────────────────────────────────────────
function nav(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const pg = document.getElementById('page-' + pageId);
  if (pg) pg.classList.add('active');
  if (el) el.classList.add('active');
  // sync bottom nav
  ['dashboard','progetti','verbale','sicurezza'].forEach(id => {
    const b = document.getElementById('bn-'+id);
    if (b) b.classList.toggle('active', id === pageId);
  });
}

function navMobile(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const pg = document.getElementById('page-' + pageId);
  if (pg) pg.classList.add('active');
  ['dashboard','progetti','verbale','sicurezza'].forEach(id => {
    const b = document.getElementById('bn-'+id);
    if (b) b.classList.toggle('active', id === pageId);
  });
  // scroll to top
  document.querySelector('.main').scrollTop = 0;
}

// ── ARCHIVIO TABS ─────────────────────────────────────────────
function showTab(tab) {
  ['ditte','pers','dpi'].forEach(t => {
    document.getElementById('arch-'+t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('#page-archivio button').forEach((b,i) => {
    b.className = i === ['ditte','pers','dpi'].indexOf(tab) ? 'btn-primary' : 'btn-ghost';
  });
}

// ── GANTT ─────────────────────────────────────────────────────
const GANTT_COLORS = {
  completato: '#3A7D44', in_corso: '#2F6EA5', ritardo: '#C07A1A', attesa: '#888'
};
const tasks = [
  {name:'Strutture',     ditta:'Costr. Bianchi', pct:100, s:0, d:8, stato:'completato'},
  {name:'Impianti',      ditta:'Elettrotech',    pct:65,  s:5, d:10,stato:'in_corso'},
  {name:'Finiture int.', ditta:'Edilfinish',     pct:40,  s:8, d:8, stato:'in_corso'},
  {name:'Facciata',      ditta:'Facciatec',      pct:30,  s:9, d:6, stato:'ritardo'},
  {name:'Imp. elettr.',  ditta:'Elettrotech',    pct:60,  s:5, d:9, stato:'in_corso'},
  {name:'Serramenti',    ditta:'Serra Srl',      pct:0,   s:11,d:4, stato:'attesa'},
];
const TOTAL=20, TODAY=11;
const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug'];

function buildGantt() {
  const c = document.getElementById('gantt-container');
  const BW = c.offsetWidth - 80 - 90 - 50;

  let html = '<div class="gantt-hdr">';
  html += '<div class="gantt-name-col">Lavorazione</div>';
  html += '<div class="gantt-ditta-col">Ditta</div>';
  html += '<div class="gantt-months">';
  months.forEach(m => html += `<div class="gantt-month">${m}</div>`);
  html += '</div><div style="width:46px;font-size:9px;color:var(--st);text-transform:uppercase;letter-spacing:.1em;text-align:right;">%</div></div>';

  tasks.forEach(t => {
    const col = GANTT_COLORS[t.stato];
    const left = (t.s / TOTAL * 100).toFixed(1);
    const width = (t.d / TOTAL * 100).toFixed(1);
    const filled = (t.pct).toFixed(0);
    const todayPct = (TODAY / TOTAL * 100).toFixed(1);
    html += `<div class="gantt-row-g">
      <div class="gantt-lbl">${t.name}</div>
      <div class="gantt-ditta">${t.ditta}</div>
      <div class="gantt-bars" style="position:relative;height:18px;flex:1;">
        <div style="position:absolute;left:${left}%;width:${width}%;top:4px;height:10px;background:rgba(255,255,255,.08);border-radius:3px;border:1px solid rgba(255,255,255,.12);"></div>
        <div style="position:absolute;left:${left}%;width:${(t.d*t.pct/100/TOTAL*100).toFixed(1)}%;top:4px;height:10px;background:${col};border-radius:3px;opacity:.9;"></div>
        <div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.35);"></div>
      </div>
      <div style="width:46px;text-align:right;font-family:var(--fc);font-size:11px;font-weight:700;color:${col};">${t.pct > 0 ? t.pct+'%' : '—'}</div>
    </div>`;
